<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; margin: 0; }
        header { text-align: center; background-color: #333; color: #fff; padding: 20px; }
        nav a { color: white; text-decoration: none; margin: 0 10px; }
        form { max-width: 500px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        input[type="submit"] { background-color: #333; color: #fff; cursor: pointer; margin-top: 15px; }
        input[type="submit"]:hover { background-color: #555; }
        footer { text-align: center; padding: 10px; background-color: #ddd; font-family: Comic Sans MS; }
    </style>
</head>
<body>
    <header>
        <h1>Entre em contato</h1>
        <nav>
            <a href="./index.html">Home</a> |
            <a href="./sobre.html">Sobre</a> |
            <a href="./servicos.html">Serviços</a> |
            <a href="./adote.html">Adote um animal</a> |
            <a href="./contato.html">Contato</a>
        </nav>
    </header>
    <main>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

            <label for="email">Email:</label>
            <input type="email" id="email" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" pattern="[0-9]{11}" placeholder="Somente números" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" pattern="[0-9]{11}" placeholder="Somente números" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" rows="5" required></textarea>

            <input type="submit" value="Enviar">
        </form>
    </main>
    <footer>
        <p>Todos os direitos reservados &copy; 2026</p>
    </footer>
</body>
</html>
